  ### 7.2 验证工具
  
  ```python
  # aes_validator.py
  
  import yaml
  import sys
  from pathlib import Path
  
  REQUIRED_SECTIONS = [
      "identity",
      "input_contract",
      "output_contract",
      "execution_constraints",
      "execution_prompt"
  ]
  
  def validate_aes(filepath: str) -> list:
      errors = []
      
      with open(filepath, 'r') as f:
          doc = yaml.safe_load(f)
      
      # 检查必需 sections
      for section in REQUIRED_SECTIONS:
          if section not in doc:
              errors.append(f"Missing required section: {section}")
      
      # 检查 identity
      if "identity" in doc:
          identity = doc["identity"]
          if not identity.get("node_id"):
              errors.append("identity.node_id is required")
          if not identity.get("executor"):
              errors.append("identity.executor is required")
      
      # 检查 input_contract
      if "input_contract" in doc:
          ic = doc["input_contract"]
          if not ic.get("required_artifacts"):
              errors.append("input_contract.required_artifacts is required")
      
      # 检查 output_contract
      if "output_contract" in doc:
          oc = doc["output_contract"]
          if not oc.get("deliverables"):
              errors.append("output_contract.deliverables is required")
          if not oc.get("acceptance_criteria"):
              errors.append("output_contract.acceptance_criteria is required")
      
      # 检查 execution_constraints
      if "execution_constraints" in doc:
          ec = doc["execution_constraints"]
          if not ec.get("must_follow"):
              errors.append("execution_constraints.must_follow is required")
          if not ec.get("must_not"):
              errors.append("execution_constraints.must_not is required")
      
      # 检查 execution_prompt
      if "execution_prompt" in doc:
          ep = doc["execution_prompt"]
          if not ep.get("template"):
              errors.append("execution_prompt.template is required")
      
      return errors
  
  if __name__ == "__main__":
      if len(sys.argv) != 2:
          print("Usage: python aes_validator.py <aes_file.yaml>")
          sys.exit(1)
      
      errors = validate_aes(sys.argv[1])
      if errors:
          print(f"❌ {len(errors)} validation errors:")
          for err in errors:
              print(f"  - {err}")
          sys.exit(1)
      else:
          print("✅ AES v3.3 structure is valid")
          sys.exit(0)
  ```
  
