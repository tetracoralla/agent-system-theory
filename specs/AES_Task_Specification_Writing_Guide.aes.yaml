  ## 第四章：管理层 Agent 职责
  
  ### 4.1 谁撰写 AES
  
  管理层 Agent 负责撰写 AES：
  
  | 管理层 Agent | 职责 |
  |-------------|------|
  | 产品总监 Agent | 撰写战略级 AES，分配给产品经理 Agent |
  | 产品经理 Agent | 撰写需求级 AES（需求调研、PRD） |
  | 项目经理 Agent | 撰写规划级 AES，分配给执行层 Agent |
  | 技术负责人 Agent | 撰写技术方案 AES，分配给开发 Agent |
  
  ### 4.2 撰写流程
  
  ```
  管理层 Agent 撰写 AES 流程：
  
  1. 接收上游 AES 或用户需求
     │
     ▼
  2. 分解任务为多个工作流节点
     │
     ▼
  3. 为每个节点撰写 AES 文件
     ├── 定义 identity（谁执行、预计时长）
     ├── 定义 input_contract（需要什么输入）
     ├── 定义 output_contract（产出什么）
     ├── 定义 execution_constraints（约束和禁止）
     ├── 编写 execution_prompt（最小提示词）
     ├── 配置 checkpoint（检查点）
     └── 定义 safeguards（防偏离规则）
     │
     ▼
  4. 编排节点执行顺序（DAG）
     │
     ▼
  5. 分配执行者（executor）
     │
     ▼
  6. 提交给系统分发
  ```
  
  ### 4.3 撰写检查清单
  
  ```yaml
  AES 撰写检查清单：
  
  完整性：
  - [ ] identity 字段完整（node_id, executor, expected_duration）
  - [ ] input_contract 列出所有必需输入
  - [ ] output_contract 列出所有交付物
  - [ ] acceptance_criteria 可验证（不是"看起来不错"）
  
  防偏离：
  - [ ] must_follow 列出所有必须遵守的规则
  - [ ] must_not 列出所有禁止行为
  - [ ] safeguards 定义关键拦截规则
  
  可执行性：
  - [ ] execution_prompt 包含所有必要信息
  - [ ] Agent 只需读 AES，不需要找其他文件
  - [ ] 文件路径准确存在
  
  时效性：
  - [ ] expected_duration 合理
  - [ ] timeout 设置合理
  - [ ] checkpoint timeout 设置合理
  ```
  
  ---
  
  ## 第五章：执行层 Agent 职责
  
  ### 5.1 执行流程
  
  ```
  执行层 Agent 执行 AES 流程：
  
  1. 接收分配的 AES 文件
     │
     ▼
  2. 验证 input_contract
     ├── 检查所有 required_artifacts 存在
     ├── 检查所有 required_context 已知
     └── 如验证失败，报告并等待
     │
     ▼
  3. 读取 execution_prompt
     └── 这是唯一指令，不需要找其他文件
     │
     ▼
  4. 执行任务
     ├── 严格遵守 must_follow
     ├── 绝对禁止 must_not
     └── 在 max_tokens 和 timeout 范围内工作
     │
     ▼
  5. 产出 output_contract.deliverables
     └── 每个交付物符合 validation
     │
     ▼
  6. 验证 acceptance_criteria
     └── 所有标准满足
     │
     ▼
  7. 如有 checkpoint，等待审批
     │
     ▼
  8. 提交执行结果
  ```
  
  ### 5.2 执行层 Agent 禁止行为
  
  ```yaml
  执行层 Agent 绝对禁止：
  
  1. 跳过 input_contract 验证
  2. 不读取 execution_prompt 就开始执行
  3. 违反 must_not 中的任何规则
  4. 绕过 checkpoint
  5. 产出 output_contract 中未列出的文件
  6. 超过 max_tokens 或 timeout
  7. 引入 AES 中未提及的外部依赖
  ```
  
