      task_id: "task_20260327_feature_x_handoff"
      task_name: "Feature X: Handoff after Week 1"
      version: "2.0.0"
      schema_version: "2.0.0"
      created_at: "2026-03-27T10:00:00Z"
      updated_at: "2026-04-03T15:30:00Z"  # Updated at handoff time
      from_agent: "implementation_agent_1"
      to_agent: "implementation_agent_2"
      session_id: "ses_feature_x_handoff"
      parent_task_id: "task_20260327_feature_x"
      aes_profile: "handoff"
      target_agents: ["implementation_agent", "handoff_agent", "reviewer"]
    
    status:
      current_phase: "implementation"
      completion_percentage: 40
      last_activity: "2026-04-03T15:30:00Z"
      completed_items:
        - "Week 1: Core implementation"
      pending_items:
        - "Week 2: Testing and documentation"
        - "Week 2 Verification and Acceptance"
    
    # Core planning sections (abbreviated - same as planning profile)
    intent:
      original_intent: "Implement Feature X to solve Problem Y"
      constraints: ["Must maintain backward compatibility", "Baseline: 2468 tests must pass"]
      success_criteria: ["Feature X works correctly", "2468+ tests pass", "Performance regression < 5%"]
      assumptions: ["Dependencies already installed"]
    
    # --- Handoff-specific sections ---
    
    state_snapshot:
      last_known_good_state: "Week 1 completed, core module implemented, 10 unit tests pass"
      resume_from: "task_2_1"  # Task ID from week2 plan
      remaining_work: ["task_2_1", "task_2_2"]
      completed_work: ["task_1_1", "task_1_2"]
      artifacts_ready_for_handoff:
        - path: "src/feature_x/__init__.py"
          integrity_hash: "sha256:abc123..."
          verified: true
        - path: "tests/unit/test_feature_x.py"
          integrity_hash: "sha256:def456..."
          verified: true
    
    handoff_contract:
      boot_order:
        - "Read state_snapshot to understand current state"
        - "Verify artifact_registry integrity hashes"
        - "Execute resume_from task (task_2_1)"
        - "Continue with remaining_work list"
      forbidden_assumptions:
        - "Assume model capabilities of previous agent"
        - "Assume previous agent's mental state or unrecorded context"
      must_verify_before_execute:
        - "Baseline test count (2468 tests still pass)"
        - "Artifact integrity hashes match"
        - "No side-effects from interrupted execution"
      handoff_instructions: |
        Previous agent was interrupted during integration testing.
        All Week 1 deliverables are complete and verified.
        Start with task_2_1 (integration testing) and proceed through remaining_work.
    
    recovery_policy:
      rollback_on_failure: true
      rollback_target: "task_1_2_complete"  # Git tag or checkpoint
      fallback_agents: ["implementation_agent_1", "supervisor_agent"]
      max_retries: 3
      retry_delay_seconds: 300
    
    # Other sections (abbreviated for brevity)
    artifacts:
      files_created: ["src/feature_x/__init__.py", "tests/unit/test_feature_x.py"]
      files_modified: []
      decisions_made: ["Used approach A for core module implementation"]
    
    next_agent_context:
      relevant_specs: ["docs/design.md §Feature X"]
      critical_assumptions: ["Database schema already has required tables"]
      hard_constraints: ["DO NOT modify existing API signatures"]
      recommendations: ["Review integration test design before proceeding"]
      known_pitfalls: ["Cache invalidation bug in module Z"]
    
    # Implementation instructions and plan sections continue...
    # (Same structure as planning profile, but starting from week2)
    ```
    
