# ========== 7. Guide Content ==========
guide_content: |
  ========== AES v3.3 工作流节点执行包写作指南 ==========
  
  ## 第一章：核心概念
  
  ### 1.1 AES 是什么
  
  **AES (Agent-Executable Specification) 是工作流节点的完整执行包**。
  
  ```
  错误理解：AES = 任务规划文档（给人看的）
  正确理解：AES = 工作流节点执行包（给 Agent 执行的）
  ```
  
  **核心特征**：
  
  | 特征 | 说明 |
  |------|------|
  | 自包含 | 所有约束、输入输出、禁止行为都在单文件内 |
  | 可执行 | Agent 读取后可直接开始工作 |
  | 防偏离 | 明确定义 must_follow 和 must_not |
  | 可拦截 | 运行时可监控并拦截偏离行为 |
  
  ### 1.2 AES 服务对象
  
  **主要服务对象：Agent（执行者）**
  
  | 角色 | 职责 |
  |------|------|
  | 管理层 Agent | 撰写 AES、编排工作流、分配任务 |
  | 执行层 Agent | 读取 AES、执行任务、产出 Artifact |
  | 运行时系统 | 验证 AES、监控执行、拦截偏离 |
  
  **次要服务对象：人类（需求方）**
  - 查看任务简报（由 AES 派生的 Markdown）
  - 不直接阅读 AES 原文
  
  ### 1.3 工作流节点与 AES 的关系
  
  每个工作流节点 = 一个 AES 文件
  
  ```
  用户需求："开发一个电商网站"
  
  工作流节点链：
  ├── AES-1: 需求调研分析      → 产品经理 Agent 执行
  ├── AES-2: 撰写 PRD          → 产品经理 Agent 执行
  ├── AES-3: 项目规划          → 项目经理 Agent 执行（生成分发）
  │   ├── AES-4: UI 设计       → 设计师 Agent 执行
  │   ├── AES-5: 前端开发      → 前端 Agent 执行
  │   └── AES-6: 后端开发      → 后端 Agent 执行
  └── AES-7: 集成测试          → QA Agent 执行
  ```
  
  ### 1.4 AES 与 Subagent 的关系
  
  ```
  AES = 任务规范（做什么、怎么做、不能做什么）
  Subagent = 执行机制（如何并行执行多个任务）
  
  关系：
  项目经理 Agent 收到 AES-3
      │
      ├── 分析任务，决定并行执行
      │
      ├── 创建 Subagent-1 → 分配 AES-4（UI 设计）
      ├── 创建 Subagent-2 → 分配 AES-5（前端开发）
      └── 创建 Subagent-3 → 分配 AES-6（后端开发）
      
  每个 Subagent 读取分配的 AES 文件并执行
  ```
  
  ---
  
  ## 第二章：AES 节点包结构
  
  ### 2.1 完整结构概览
  
  ```yaml
  # AES v3.3 工作流节点执行包结构
  
  # === 身份与边界 ===
  identity:                    # 节点身份定义
    node_id: "..."
    node_name: "..."
    executor: "..."            # 执行者 Agent
    parent_node: "..."         # 父节点
    expected_duration: "..."   # 预计时长
  
  # === 输入契约（必须满足才能启动）===
  input_contract:
    required_artifacts: [...]  # 必需的输入工件
    required_context: [...]    # 必需的上下文
    forbidden_assumptions: [...] # 禁止的假设
    knowledge_context:         # 背景知识上下文（v3.3新增）
      terminology: [...]       # 术语/缩写解释
      internal_lingo: [...]    # 内部行话/黑话
      background_links: [...]  # 相关背景链接
      similar_tasks: [...]     # 历史类似任务
      domain_nuances: [...]    # 领域特异性知识
  
  # === 输出契约（必须产出的内容）===
  output_contract:
    deliverables: [...]        # 交付物列表
    acceptance_criteria: [...] # 验收标准
  
  # === 执行约束（防止 Agent 偏离）===
  execution_constraints:
    must_follow: [...]         # 必须遵守
    must_not: [...]            # 禁止行为
    max_tokens: ...            # 输出上限
    timeout: "..."             # 超时限制
  
  # === 执行提示词（最小化但完整）===
  execution_prompt:
    template: "..."            # 提示词模板
  
  # === Checkpoint 配置 ===
  checkpoint:
    enabled: true/false
    type: "..."
    approvers: [...]
    auto_approve_if: [...]
  
   # === 风险预防（运行时拦截）===
   safeguards:
     deviation_detection: [...] # 偏离检测规则
     fallback: [...]            # 降级方案
   
# === 变更管理（工作流链一致性）===
    change_management:
      propagation_mode: "..."    # 变更传播策略
      version_compatibility: "..." # 版本兼容性
      rollback_strategy: "..."   # 回滚策略

   # === 执行报告（execution_report Profile 必需字段）===
   execution_summary:
     executing_agent: string        # 执行 Agent 标识
     execution_start: timestamp     # 执行开始时间
     execution_end: timestamp       # 执行结束时间
     actual_effort: string          # 实际工作量
     tasks_completed: list          # 已完成任务列表
     tasks_skipped: list            # 跳过任务列表（含原因）

   execution_metrics:
     duration: string               # 实际执行时长
     tokens_used: integer           # Token 消耗（可选）
     files_created: integer         # 创建文件数
     files_modified: integer        # 修改文件数
     test_coverage: integer         # 测试覆盖率（可选）

   output_artifacts:
     - path: string                 # 工件路径
       description: string          # 工件描述
       status: string               # completed | partial | failed
       hash: string                 # 哈希校验（可选）

quality_verification:
      - criteria: string             # 验证标准
        status: string               # passed | failed | skipped
        evidence: string             # 验证证据（可选）

    # === 知识捕获（execution_report Profile 可选字段，v3.3新增）===
    knowledge_capture:
      discoveries:                   # 任务中发现的知识
        - type: string               # terminology | pattern | solution | nuance
          content: string            # 知识内容
          context: string            # 发现上下文
          confidence: float          # 置信度 0.0-1.0
          reusable: boolean          # 是否可复用
      suggestions:                   # 知识库改进建议
        - area: string               # 改进领域
          suggestion: string         # 具体建议
          priority: string           # high | medium | low
    ```
  
  ### 2.2 各字段详解
  
  #### 2.2.1 identity（身份与边界）
  
   ```yaml
   identity:
     node_id: "aes-004-ui-design"           # 节点唯一标识
     node_name: "UI 设计"                    # 节点名称
     executor: "designer_agent"              # 执行者 Agent ID
     parent_node: "aes-003-project-planning" # 父节点（工作流上游）
     child_nodes: ["aes-007-integration-test"] # 子节点（工作流下游）
     workflow_chain_id: "workflow-ecommerce-001" # 所属工作流链标识
     expected_duration: "2h"                 # 预计执行时长
   ```
  
**规则**：
    - `node_id` 格式：`aes-{sequence}-{short-name}`
    - `executor` 必须是系统中已注册的 Agent
    - `parent_node` 用于追溯工作流上游来源
    - `child_nodes` 用于声明工作流下游节点（可选，管理层Agent填写）
    - `workflow_chain_id` 用于标识所属工作流链，支持变更传播分析

  **meta.aes_profile 说明**（见 §3.1）：
  ```yaml
  meta:
    aes_profile: "planning"  # planning | handoff | execution_report
    # planning: 初始规划阶段（定义任务）
    # handoff: 交接/恢复阶段（状态快照）
    # execution_report: 执行完成阶段（终态，填写执行报告）
  ```
  
  #### 2.2.2 input_contract（输入契约）
  
  **定义任务启动前必须满足的条件**。
  
  ```yaml
  input_contract:
    required_artifacts:
      - artifact_id: "prd-v1.0"
        type: "document"                    # document|code|data|config
        path: "artifacts/prd.md"
        validation: "必须包含页面列表和交互说明"
        required: true                      # 是否必需
    
    required_context:
      - "产品类型：电商"
      - "目标用户：C端消费者"
      - "技术栈：React + Node.js"
    
    forbidden_assumptions:
      - "不要假设设计风格已确定"
      - "不要假设用户已明确所有需求"
      - "不要跳过设计规范检查"
    
    knowledge_context:
      terminology:
        - term: "SKU"
          definition: "Stock Keeping Unit，库存单位"
        - term: "GMV"
          definition: "Gross Merchandise Volume，商品交易总额"
      
      internal_lingo:
        - phrase: "跑批"
          meaning: "批量数据处理任务"
        - phrase: "灰度"
          meaning: "渐进式发布策略"
      
      background_links:
        - title: "Q4业务规划"
          url: "wiki/business/q4-planning"
        - title: "技术架构文档"
          url: "confluence/arch/overview"
      
      similar_tasks:
        - task_id: "aes-002-similar-project"
          similarity: "相同业务领域"
          lessons: "用户偏好简洁的界面设计"
      
      domain_nuances:
        - area: "促销活动"
          nuance: "秒杀场景需考虑库存并发扣减"
        - area: "用户权限"
          nuance: "企业客户有额外的审批流程"
  ```
  
  **关键作用**：
  1. Agent 启动前验证所有输入是否就绪
  2. 明确告诉 Agent "不要假设什么"，防止过度发挥
  3. 提供背景知识，帮助 Agent 理解企业特定语境（v3.3新增）

  #### 2.2.3 knowledge_context（背景知识上下文）【v3.3新增】

  **定义任务执行所需的背景知识，实现隐性知识的显性传递**。

  ```yaml
  knowledge_context:
    terminology:                    # 术语/缩写解释
      - term: "SKU"
        definition: "Stock Keeping Unit，库存单位"
        category: "business"        # business | technical | domain
      - term: "PR"
        definition: "Pull Request，代码合并请求"
        category: "technical"
    
    internal_lingo:                 # 内部行话/黑话
      - phrase: "跑批"
        meaning: "批量数据处理任务"
        context: "通常指夜间执行的ETL任务"
      - phrase: "灰度"
        meaning: "渐进式发布策略"
        context: "先开放给部分用户测试"
    
    background_links:               # 相关背景链接
      - title: "Q4业务规划"
        url: "wiki/business/q4-planning"
        relevance: "理解当前项目优先级"
      - title: "技术架构文档"
        url: "confluence/arch/overview"
        relevance: "理解系统架构约束"
    
    similar_tasks:                  # 历史类似任务
      - task_id: "aes-002-similar-project"
        similarity: "相同业务领域"
        lessons: "用户偏好简洁的界面设计"
        reusable_solutions: ["组件库复用", "API设计模式"]
    
    domain_nuances:                 # 领域特异性知识
      - area: "促销活动"
        nuance: "秒杀场景需考虑库存并发扣减"
        implication: "需要分布式锁机制"
      - area: "用户权限"
        nuance: "企业客户有额外的审批流程"
        implication: "权限模型需支持多级审批"
  ```

  **设计理念**（基于隐性知识显性化理论）：
  1. **术语标准化**：确保Agent理解企业特定术语，避免误解
  2. **行话解释**：传递企业内部沟通习惯，提高协作效率
  3. **背景链接**：提供知识来源，支持Agent深入理解
  4. **经验复用**：利用历史任务经验，避免重复犯错
  5. **领域敏感性**：传递领域特有约束和注意事项

  **与企业知识管理的映射**：
  | knowledge_context 字段 | 知识管理理论 | 企业实践案例 |
  |------------------------|--------------|--------------|
  | terminology | 术语标准化 | IBM术语库、Siemens知识图谱 |
  | internal_lingo | 组织语言 | Toyota生产系统术语、GE文化语言 |
  | background_links | 知识链接 | 知识图谱关联、Wiki链接 |
  | similar_tasks | 经验复用 | 案例库、最佳实践库 |
  | domain_nuances | 隐性知识显性化 | SECI模型外显化阶段 |

  **使用场景**：
  1. 新Agent加入项目时，快速理解企业语境
  2. 跨部门协作时，消除术语歧义
  3. 任务交接时，保留背景知识
  4. 知识积累时，持续补充更新
  
  #### 2.2.3 output_contract（输出契约）
  
  **定义任务完成后必须产出的内容**。
  
  ```yaml
  output_contract:
    deliverables:
      - artifact_id: "ui-design-v1.0"
        type: "code"
        path: "artifacts/ui/"
        validation: "必须符合设计系统规范"
        required: true
      
      - artifact_id: "design-report"
        type: "document"
        path: "artifacts/design-report.md"
        validation: "必须说明设计决策"
        required: true
    
    acceptance_criteria:
      - "所有 PRD 中列出的页面都有对应代码"
      - "代码通过设计系统 lint 检查"
      - "响应式布局覆盖移动端和桌面端"
      - "设计报告包含至少 3 个设计决策的理由"
  ```
  
  **关键作用**：
  1. 明确告诉 Agent "必须产出什么"
  2. 提供可验证的验收标准
  
  #### 2.2.4 execution_constraints（执行约束）
  
  **这是防止 Agent 偏离的核心字段**。
  
  ```yaml
  execution_constraints:
    must_follow:
      - "严格按照 design_system/components/ 中的组件库"
      - "颜色只能使用 design_system/tokens/colors.yaml 中定义的值"
      - "间距必须是 4px 的倍数"
      - "每个组件必须有对应的 Storybook 文档"
    
    must_not:
      - "禁止引入新的第三方 UI 库"
      - "禁止自定义 CSS 颜色值"
      - "禁止跳过设计评审 Checkpoint"
      - "禁止修改设计系统的核心组件"
    
    max_tokens: 50000           # 输出 token 上限
    timeout: "2h"               # 执行超时
    max_files_created: 20       # 创建文件数上限
    max_file_size: "1MB"        # 单文件大小上限
  ```
  
  **关键作用**：
  1. `must_follow`：正向约束，Agent 必须遵守
  2. `must_not`：负向约束，Agent 禁止行为
  3. 运行时监控 Agent 行为，发现违反时拦截
  
  #### 2.2.5 execution_prompt（执行提示词）
  
  **给 Agent 的唯一指令，最小化但完整**。
  
  ```yaml
  execution_prompt:
    template: |
      你是一个专业的 UI 设计师 Agent。
      
      任务：根据 PRD 生成符合设计系统的页面代码。
      
      输入：
      - PRD 文档：{input_contract.required_artifacts[0].path}
      - 设计系统：design_system/
      
      约束：
      {execution_constraints.must_follow}
      
      禁止：
      {execution_constraints.must_not}
      
      输出：
      - 页面代码：{output_contract.deliverables[0].path}
      - 设计报告：{output_contract.deliverables[1].path}
      
      验收标准：
      {output_contract.acceptance_criteria}
      
      现在，阅读 PRD 并开始生成页面代码。
    
    variables:
      - name: "input_contract.required_artifacts[0].path"
        description: "自动填充输入工件路径"
      - name: "execution_constraints.must_follow"
        description: "自动填充约束列表"
  ```
  
  **关键原则**：
  1. 提示词是给 Agent 的唯一指令
  2. 所有需要的信息都已经在提示词里
  3. Agent 不需要"发挥创造力去找文档"
  
  #### 2.2.6 checkpoint（检查点配置）
  
  ```yaml
  checkpoint:
    enabled: true
    type: "design_review"               # design_review|code_review|acceptance
    approvers: ["product_manager", "design_lead"]
    
    auto_approve_if:
      - condition: "lint_check: passed"
      - condition: "design_system_compliance: 100%"
      - condition: "test_coverage: >= 80%"
    
    manual_approve_required:
      - condition: "new_component_created: true"
        approvers: ["design_lead"]
    
    timeout: "24h"
    timeout_action: "archive"           # archive|escalate|auto_reject
  ```
  
  #### 2.2.7 safeguards（风险预防）
  
  **定义运行时拦截规则，防止 Agent "聪明反被聪明"**。
  
  ```yaml
  safeguards:
    deviation_detection:
      # 拦截规则
      - trigger: "npm_install_new_package"
        action: "block"
        message: "禁止引入新的第三方库，请使用设计系统现有组件"
      
      - trigger: "bypass_design_system"
        action: "block"
        message: "必须使用设计系统定义的颜色和组件"
      
      - trigger: "skip_checkpoint"
        action: "block"
        message: "必须经过设计评审 Checkpoint"
      
      - trigger: "output_exceed_max_tokens"
        action: "truncate"
        message: "输出超过限制，已截断"
      
      - trigger: "create_unexpected_file"
        pattern: "**/*.secret"
        action: "block"
        message: "禁止创建敏感文件"
    
    fallback:
      # 降级方案
      - condition: "design_system_component_insufficient"
        action: "submit_design_review_request"
        message: "设计系统组件不满足需求，已提交设计评审请求"
      
      - condition: "timeout"
        action: "save_progress_and_notify_downstream"
        message: "执行超时，已保存进度并通知下游节点"
      
      - condition: "max_retries_exceeded"
        action: "escalate_to_human"
        message: "超过最大重试次数，已升级到人工处理"
  ```
  
   **关键作用**：
   1. 定义触发条件（trigger）和拦截动作（action）
   2. 运行时监控 Agent 行为
   3. 发现偏离时主动拦截并提醒

   #### 2.2.8 change_management（变更管理）

   **定义需求变更时的传播策略和工作流链一致性保障**。

   ```yaml
   change_management:
     propagation_mode: "cascade"  # none/cascade/parallel/stop
     version_compatibility: "backward_compatible"
     rollback_strategy: "revert_to_checkpoint"
     notification_targets:
       - "executor"              # 通知当前节点执行者
       - "child_nodes"           # 通知所有下游节点
       - "workflow_orchestrator" # 通知工作流编排器
   
   # 四种传播策略：
   # 1. none: 仅修订当前节点，下游不变（适用于澄清类变更）
   # 2. cascade: 串行下游，等待当前节点完成后修订（适用于架构调整）
   # 3. parallel: 并行下游，标记待修订（适用于业务逻辑变更）
   # 4. stop: 暂停整个工作流分支（适用于重大需求变更）
   ```

   **使用场景**：
   - 管理层Agent修订AES后，系统自动分析影响范围
   - 根据propagation_mode决定变更传播策略
   - 通过workflow_chain_id追踪同一工作流链的所有节点
   - 执行层Agent可通过node_registry查询上下游节点状态

   ---
  
  ## 第三章：AES Profile 机制
  
  ### 3.1 三种 Profile
  
  | Profile | 阶段 | 用途 | 必需字段 |
  |---------|------|------|----------|
  | planning | 任务规划期 | 定义任务、约束、输入输出 | identity, input_contract, output_contract, execution_constraints, execution_prompt |
  | handoff | 任务交接期 | 状态快照、恢复上下文 | + state_snapshot, handoff_contract |
  | execution_report | 任务完成期 | 执行结果、审计追溯 | + execution_summary, execution_metrics, output_artifacts, quality_verification |
  
  ### 3.2 Profile 演进
  
  ```
  AES 文件生命周期：
  
  planning.aes.yaml
      │
      │ Agent 开始执行
      ▼
  handoff.aes.yaml（如果需要交接或中断恢复）
      │
      │ Agent 完成任务
      ▼
  execution_report.aes.yaml
      │
      │ 归档
      ▼
  archive/
  ```
  
  ### 3.3 Handoff Profile 新增字段
  
  ```yaml
  state_snapshot:
    last_known_good_state: "已生成 3 个页面组件"
    resume_from: "task_2_1"
    remaining_work: ["task_2_2", "task_3_1"]
    artifacts_snapshot:
      - path: "artifacts/ui/Home.tsx"
        hash: "sha256:abc123..."
        status: "complete"
  
  handoff_contract:
    boot_order:
      - "验证 artifacts_snapshot 完整性"
      - "读取 state_snapshot 了解当前进度"
      - "从 resume_from 继续执行"
    
    forbidden_assumptions:
      - "不要假设上一个 Agent 的 mental state"
      - "不要假设未记录的上下文"
    
    must_verify_before_execute:
      - "所有 artifacts_snapshot 中的文件存在且 hash 匹配"
      - "基线测试仍然通过"
  ```
  
  ### 3.4 Execution Report Profile 新增字段

#### 3.4.1 字段详解

**execution_summary**：执行摘要，记录任务执行的基本信息。

```yaml
execution_summary:
  executing_agent: "designer_agent"  # 执行 Agent 标识（必需）
  execution_start: "2026-03-28T10:00:00Z"  # 执行开始时间（必需）
  execution_end: "2026-03-28T11:30:00Z"    # 执行结束时间（必需）
  actual_effort: "1.5小时"                 # 实际工作量（推荐）
  tasks_completed:                        # 已完成任务列表（推荐）
    - "生成首页组件"
    - "生成商品列表页组件"
  tasks_skipped:                          # 跳过任务列表（可选）
    - task: "生成商品详情页组件"
      reason: "PRD 中未明确需求"
```

**execution_metrics**：执行指标，记录执行过程的统计信息。

```yaml
execution_metrics:
  duration: "1.5h"           # 实际执行时长（推荐）
  tokens_used: 35000         # Token 消耗（可选）
  files_created: 12          # 创建文件数（推荐）
  files_modified: 3          # 修改文件数（推荐）
  test_coverage: 85          # 测试覆盖率（可选）
```

**output_artifacts**：输出工件，记录实际产出的文件清单。

```yaml
output_artifacts:
  - path: "artifacts/ui/"           # 工件路径（必需）
    description: "UI 页面代码"       # 工件描述（必需）
    status: "completed"             # 状态：completed | partial | failed（必需）
    hash: "sha256:def456..."        # 哈希校验（可选）
  - path: "artifacts/design-report.md"
    description: "设计决策报告"
    status: "completed"
```

**quality_verification**：质量验证，记录验收标准的验证结果。

```yaml
quality_verification:
  - criteria: "所有 PRD 页面已实现"  # 验证标准（必需）
    status: "passed"                # passed | failed | skipped（必需）
    evidence: "PRD 列出 3 个页面，实现 3 个页面"  # 验证证据（推荐）
  - criteria: "设计系统 lint 检查"
    status: "passed"
    evidence: "lint 输出：0 errors, 2 warnings"
- criteria: "响应式布局"
    status: "passed"
    evidence: "覆盖 320px-1920px 断点"
  ```

  **knowledge_capture**：知识捕获，记录任务执行中发现的新知识【v3.3新增】。

  ```yaml
  knowledge_capture:
    discoveries:                      # 任务中发现的知识
      - type: "terminology"           # terminology | pattern | solution | nuance | warning
        content: "RPD在内部指'Requirement Planning Document'"
        context: "在需求评审会议中发现"
        confidence: 0.95
        reusable: true
        suggested_action: "add_to_terminology_database"
      
      - type: "pattern"
        content: "用户在移动端更倾向于滑动而非点击"
        context: "分析用户行为数据时发现"
        confidence: 0.85
        reusable: true
        suggested_action: "update_design_guidelines"
      
      - type: "solution"
        content: "使用防抖处理搜索输入，减少API调用"
        context: "解决搜索框性能问题时发现"
        confidence: 0.90
        reusable: true
        suggested_action: "add_to_best_practices"
      
      - type: "nuance"
        content: "企业客户的审批流程需要多级嵌套"
        context: "在权限设计时发现"
        confidence: 0.80
        reusable: true
        suggested_action: "update_domain_knowledge"
      
      - type: "warning"
        content: "第三方库X在特定场景下有内存泄漏"
        context: "性能测试时发现"
        confidence: 0.95
        reusable: true
        suggested_action: "add_to_known_issues"
    
    suggestions:                      # 知识库改进建议
      - area: "terminology"
        suggestion: "增加'跑批'的正式术语定义"
        priority: "medium"
        reason: "多次在任务中出现歧义"
      
      - area: "similar_tasks"
        suggestion: "增加电商促销类任务的参考案例"
        priority: "high"
        reason: "促销活动任务频繁，经验复用价值高"
      
      - area: "domain_nuances"
        suggestion: "补充企业客户的权限模型说明"
        priority: "high"
        reason: "影响多个功能模块的设计"
  ```

  **设计理念**（基于隐性知识显性化与知识演化理论）：
  1. **知识发现**：从任务执行中识别有价值的隐性知识
  2. **结构化提取**：将隐性知识转化为可复用的结构化形式
  3. **置信度评估**：量化知识的可靠性，支持过滤低质量发现
  4. **行动建议**：指导知识如何纳入组织知识库
  5. **反馈闭环**：知识改进建议驱动知识库持续优化

  **知识类型说明**：
  | 类型 | 说明 | 示例 | 典型置信度 |
  |------|------|------|-----------|
  | terminology | 新发现的术语/缩写含义 | "RPD=Requirement Planning Document" | 0.90+ |
  | pattern | 可复用的模式/规律 | "移动端用户偏好滑动操作" | 0.70-0.90 |
  | solution | 问题解决方案 | "防抖处理减少API调用" | 0.85+ |
  | nuance | 领域特异性知识 | "企业客户需要多级审批" | 0.75+ |
  | warning | 需要注意的风险/问题 | "第三方库X有内存泄漏" | 0.90+ |

  **与企业知识管理的映射**：
  | knowledge_capture 字段 | 知识管理理论 | 企业实践案例 |
  |------------------------|--------------|--------------|
  | discoveries | SECI模型社会化→外显化 | Toyota经验沉淀、GE最佳实践提取 |
  | suggestions | 知识库持续优化 | IBM知识图谱更新、Siemens知识质量管理 |

  **使用场景**：
  1. 任务执行完成后，自动提取发现的知识
  2. 知识质量评估后，决定是否纳入知识库
  3. 知识库管理员审核knowledge_capture报告
  4. 高置信度知识自动更新到knowledge_context模板

  #### 3.4.2 完整示例

```yaml
# execution_report Profile 完整示例
execution_summary:
  executing_agent: "designer_agent"
  execution_start: "2026-03-28T10:00:00Z"
  execution_end: "2026-03-28T11:30:00Z"
  actual_effort: "1.5小时"
  tasks_completed:
    - "生成首页组件"
    - "生成商品列表页组件"
    - "生成商品详情页组件"
  tasks_skipped: []

execution_metrics:
  duration: "1.5h"
  tokens_used: 35000
  files_created: 12
  files_modified: 3
