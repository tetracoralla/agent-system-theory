    ## Appendix A: Tooling Examples (Optional)
    
    ### JSON Schema Starter Template
    
    For teams wanting to validate AES documents programmatically, here's a minimal JSON Schema starter:
    
    ```json
    {
      "$schema": "http://json-schema.org/draft-2020-12/schema",
      "$id": "https://example.com/aes-schema/v2.0.json",
      "title": "AES (Agent-Executable Specification) v2.0",
      "description": "Schema for validating AES task specifications",
      "type": "object",
      "properties": {
        "meta": {
          "type": "object",
          "properties": {
            "task_id": { "type": "string", "pattern": "^task_\\d{8}_[a-zA-Z0-9_-]+$" },
            "task_name": { "type": "string" },
            "version": { "type": "string", "pattern": "^\\d+\\.\\d+\\.\\d+$" },
            "schema_version": { "type": "string", "const": "2.0.0" },
            "aes_profile": {
              "type": "string",
              "enum": ["planning", "handoff", "execution_report"]
            },
            "created_at": { "type": "string", "format": "date-time" },
            "updated_at": { "type": "string", "format": "date-time" }
          },
          "required": ["task_id", "task_name", "version", "schema_version", "aes_profile", "created_at", "updated_at"],
          "additionalProperties": true
        },
        "status": {
          "type": "object",
          "properties": {
            "current_phase": { "type": "string" },
            "completion_percentage": { "type": "number", "minimum": 0, "maximum": 100 }
          },
          "required": ["current_phase", "completion_percentage"],
          "additionalProperties": true
        },
        "intent": {
          "type": "object",
          "properties": {
            "original_intent": { "type": "string" },
            "constraints": { "type": "array", "items": { "type": "string" } },
            "success_criteria": { "type": "array", "items": { "type": "string" } }
          },
          "required": ["original_intent", "constraints", "success_criteria"],
          "additionalProperties": true
        }
      },
      "required": ["meta", "status", "intent"],
      "additionalProperties": true,
      "if": {
        "properties": { "meta": { "properties": { "aes_profile": { "const": "handoff" } } } }
      },
      "then": {
        "required": ["state_snapshot", "handoff_contract", "recovery_policy"]
      },
      "else": {
        "if": {
          "properties": { "meta": { "properties": { "aes_profile": { "const": "execution_report" } } } }
        },
        "then": {
          "required": ["checkpoint_receipts", "artifact_registry", "validation_rules"]
        }
      }
    }
    ```
    
    ### Lint Rule Example (Python)
    
    Simple Python script to check AES document structure:
    
    ```python
    # aes_lint.py - Basic structural validation for AES documents
    import yaml
    import sys
    
    REQUIRED_SECTIONS = ["meta", "status", "intent", "artifacts", "next_agent_context"]
    
    PROFILE_SPECIFIC = {
        "handoff": ["state_snapshot", "handoff_contract", "recovery_policy"],
        "execution_report": ["checkpoint_receipts", "artifact_registry", "validation_rules"]
    }
    
    def lint_aes(filepath):
        with open(filepath, 'r') as f:
            doc = yaml.safe_load(f)
        
        errors = []
        
        # Check required sections
        for section in REQUIRED_SECTIONS:
            if section not in doc:
                errors.append(f"Missing required section: {section}")
        
        # Check profile-specific sections
        profile = doc.get("meta", {}).get("aes_profile")
        if profile in PROFILE_SPECIFIC:
            for section in PROFILE_SPECIFIC[profile]:
                if section not in doc:
                    errors.append(f"Profile '{profile}' requires section: {section}")
        
        # Check schema_version matches
        schema_version = doc.get("meta", {}).get("schema_version")
        if schema_version != "2.0.0":
            errors.append(f"schema_version should be '2.0.0', got '{schema_version}'")
        
        return errors
    
    if __name__ == "__main__":
        if len(sys.argv) != 2:
            print("Usage: python aes_lint.py <aes_file.yaml>")
            sys.exit(1)
        
        errors = lint_aes(sys.argv[1])
        if errors:
            print(f"❌ {len(errors)} validation errors found:")
            for err in errors:
                print(f"  - {err}")
            sys.exit(1)
        else:
            print("✅ AES document structure is valid")
            sys.exit(0)
    ```
    
    ### Usage Recommendations
    
    1. **Start simple**: Use the lint script for basic validation during development.
    2. **Gradual adoption**: Add JSON Schema validation in CI/CD pipelines once team is comfortable.
    3. **Profile awareness**: Ensure tooling respects profile-specific section requirements.
    4. **Customization**: Extend with project-specific rules (e.g., required test counts, naming conventions).
    
