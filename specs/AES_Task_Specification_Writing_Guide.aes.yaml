## 附录：快速参考卡

  ```
  AES v3.3 工作流节点执行包 = {
    // Planning 阶段必需
    identity:           节点身份（谁执行、预计时长）
    input_contract:     输入契约（需要什么、禁止假设什么）
      └─ knowledge_context: 背景知识上下文（术语、行话、背景链接）【v3.3新增】
    output_contract:    输出契约（产出什么、验收标准）
    execution_constraints: 执行约束（必须遵守、禁止行为）
    execution_prompt:   执行提示词（唯一指令）
    checkpoint:         检查点（质量门禁）
    safeguards:         防偏离规则（运行时拦截）
    change_management:  变更管理（工作流链一致性）
    
    // Handoff 阶段新增
    state_snapshot:     状态快照（中断恢复用）
    handoff_contract:   交接契约（启动顺序、验证清单）
    
    // Execution Report 阶段新增
    execution_summary:  执行摘要（谁执行、时长、完成情况）
    execution_metrics:  执行指标（统计信息）
    output_artifacts:   输出工件（实际产出）
    quality_verification: 质量验证（验证结果）
    knowledge_capture:  知识捕获（发现的知识、改进建议）【v3.3新增】
  }
  
  核心原则：
  1. 自包含：所有信息在一个文件内
  2. 最小提示词：Agent 只需读 AES
  3. 防偏离：明确定义 must_follow 和 must_not
  4. 可拦截：运行时监控并拦截
  5. 可演进：Profile 演进 planning → handoff → execution_report
  6. 知识传递：通过 knowledge_context 传递背景，通过 knowledge_capture 捕获新知【v3.3新增】
  
  文件命名：aes-{sequence}-{short-name}.yaml
  文件位置：runtime/aes/instances/
  目标大小：100-200 行 / 5KB 以内
  ```
  
