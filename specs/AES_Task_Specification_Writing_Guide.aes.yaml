  ## 第六章：完整示例
  
  ### 6.1 UI 设计节点 AES
  
  ```yaml
  # aes-004-ui-design.yaml
  
  identity:
    node_id: "aes-004-ui-design"
    node_name: "UI 设计"
    executor: "designer_agent"
    parent_node: "aes-003-project-planning"
    expected_duration: "2h"
  
  input_contract:
    required_artifacts:
      - artifact_id: "prd-v1.0"
        type: "document"
        path: "artifacts/prd.md"
        validation: "必须包含页面列表和交互说明"
        required: true
    
    required_context:
      - "产品类型：电商"
      - "目标用户：C端消费者"
      - "设计系统版本：v2.0"
    
    forbidden_assumptions:
      - "不要假设设计风格已确定"
      - "不要跳过设计规范检查"
  
  output_contract:
    deliverables:
      - artifact_id: "ui-design-v1.0"
        type: "code"
        path: "artifacts/ui/"
        validation: "必须符合设计系统规范"
        required: true
      
      - artifact_id: "design-report"
        type: "document"
        path: "artifacts/design-report.md"
        validation: "必须说明设计决策"
        required: true
    
    acceptance_criteria:
      - "所有 PRD 中列出的页面都有对应代码"
      - "代码通过设计系统 lint 检查"
      - "响应式布局覆盖移动端和桌面端"
  
  execution_constraints:
    must_follow:
      - "严格按照 design_system/components/ 中的组件库"
      - "颜色只能使用 design_system/tokens/colors.yaml 中定义的值"
      - "间距必须是 4px 的倍数"
    
    must_not:
      - "禁止引入新的第三方 UI 库"
      - "禁止自定义 CSS 颜色值"
      - "禁止跳过设计评审 Checkpoint"
    
    max_tokens: 50000
    timeout: "2h"
  
  execution_prompt:
    template: |
      你是一个专业的 UI 设计师 Agent。
      
      任务：根据 PRD 生成符合设计系统的页面代码。
      
      输入：
      - PRD 文档：artifacts/prd.md
      - 设计系统：design_system/
      
      约束：
      - 严格按照 design_system/components/ 中的组件库
      - 颜色只能使用 design_system/tokens/colors.yaml 中定义的值
      - 间距必须是 4px 的倍数
      
      禁止：
      - 禁止引入新的第三方 UI 库
      - 禁止自定义 CSS 颜色值
      - 禁止跳过设计评审 Checkpoint
      
      输出：
      - 页面代码：artifacts/ui/
      - 设计报告：artifacts/design-report.md
      
      验收标准：
      - 所有 PRD 中列出的页面都有对应代码
      - 代码通过设计系统 lint 检查
      - 响应式布局覆盖移动端和桌面端
      
