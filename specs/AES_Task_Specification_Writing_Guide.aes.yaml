  ## 第八章：常见问题
  
  ### Q1: AES 文件应该多大？
  
  **目标：100-200 行，控制在 5KB 以内**。
  
  如果超过，说明：
  1. 节点拆分不够细
  2. 提示词过于冗长
  3. 约束列表过于详细
  
  ### Q2: 如何防止 Agent 只读 AES 但跳过其他文件？
  
  **核心原则：AES 必须自包含**。
  
  1. 所有约束、输入输出都在 AES 内
  2. execution_prompt 包含所有必要信息
  3. Agent 不需要找其他文件
  4. 运行时监控 Agent 行为，发现偏离时拦截
  
  ### Q3: 管理层 Agent 和执行层 Agent 如何分工？
  
  ```
  管理层 Agent（产品经理/项目经理）：
  - 撰写 AES
  - 编排工作流
  - 分配任务
  - 监控进度
  
  执行层 Agent（设计师/前端/后端/QA）：
  - 读取 AES
  - 执行任务
  - 产出 Artifact
  - 报告进度
  ```
  
  ### Q4: 如何处理 Agent 执行失败？
  
  1. **自动重试**：safeguards.fallback 定义重试策略
  2. **降级执行**：降低要求继续执行
  3. **人工介入**：升级到人类处理
  4. **回滚**：恢复到上一个 Checkpoint
  
  ### Q5: AES 与现有 Phase 15 规划的关系？
  
  Phase 15 实施文档（phase15-x_implementation.aes.yaml）是**元级别 AES**：
  - 定义如何构建系统
  - 不是工作流节点执行包
  
  未来生成的 AES 实例（运行时）是**工作流节点执行包**：
  - 由管理层 Agent 撰写
  - 分发给执行层 Agent 执行
  - 存储在 runtime/aes/instances/

  ### §8.2 版本号管理规则

  #### 8.2.1 语义化版本规范

  AES 规范采用语义化版本：MAJOR.MINOR.PATCH

  | 版本类型 | 变更类型 | 示例 |
  |---------|---------|------|
  | MAJOR | 不兼容的结构性变更 | 3.0.0 → 4.0.0（新增必需字段） |
  | MINOR | 向后兼容的功能新增 | 3.1.0 → 3.2.0（新增可选字段） |
  | PATCH | 向后兼容的问题修复 | 3.1.0 → 3.1.1（修正错误、补充说明） |

  #### 8.2.2 修订时必做事项

  修订 AES 规范时，**必须**同步更新以下内容：

  ```yaml
  # 1. 更新 meta.version
  meta:
    version: "3.3.0"  # 从 3.2.0 更新

  # 2. 更新 meta.updated_at
  meta:
    updated_at: "2026-03-28T17:00:00Z"

  # 3. 新增修订日志条目（见 §8.3）
  revision_log:
    - version: "3.2.0"
      date: "2026-03-28"
      changes: ["新增 execution_report 阶段完整字段定义", "新增版本号管理规则"]
  ```

  #### 8.2.3 版本更新检查清单

  - [ ] 修订内容是否影响向后兼容性？
  - [ ] 是否需要更新 MAJOR 版本？
  - [ ] 是否需要更新 MINOR 版本？
  - [ ] meta.version 是否已更新？
  - [ ] meta.updated_at 是否已更新？
  - [ ] 修订日志是否已更新？

  ### §8.3 修订日志

  AES 规范维护修订日志，记录每次变更：

  ```yaml
  revision_log:
    - version: "3.3.0"
      date: "2026-03-28"
      author: "chief_architect"
      changes:
        - "新增 §2.2.3 knowledge_context 字段（背景知识上下文）"
        - "新增 §3.4.1 knowledge_capture 字段（知识捕获）"
        - "完善 §2.1 完整结构概览，新增知识管理相关字段"
        - "集成隐性知识显性化理论（基于SECI模型和知识演化研究）"
        - "新增与企业知识管理实践的映射（Toyota、IBM、Siemens案例）"
      compatibility: "backward_compatible"
    
    - version: "3.2.0"
      date: "2026-03-28"
      author: "technical_writer_agent"
      changes:
        - "新增 §2.1 execution_report 阶段完整字段定义"
        - "完善 §3.4 Execution Report Profile 字段详解和示例"
        - "新增 §8.2 版本号管理规则"
        - "新增 §8.3 修订日志"
      compatibility: "backward_compatible"
    
    - version: "3.1.0"
      date: "2026-03-28"
      author: "chief_architect"
      changes:
        - "新增 change_management 字段"
        - "新增 workflow_chain_id 和 child_nodes 字段"
      compatibility: "backward_compatible"
    
    - version: "3.0.0"
      date: "2026-03-27"
      author: "chief_architect"
      changes:
        - "从任务规划文档升级为工作流节点执行包"
        - "新增 input_contract, output_contract 字段"
        - "新增 execution_constraints, execution_prompt 字段"
        - "新增 safeguards 防偏离机制"
      compatibility: "breaking"
  ```

  **修订日志字段说明**：
  - `version`: 修订后的版本号
  - `date`: 修订日期
  - `author`: 修订者
  - `changes`: 变更内容列表
  - `compatibility`: 兼容性类型（backward_compatible | breaking）
  
