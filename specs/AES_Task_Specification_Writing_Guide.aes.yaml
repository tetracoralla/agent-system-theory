    ## 11. Frequently Asked Questions (FAQ)
    
    ### Profile Selection & Usage
    
    **Q1: When should I use Planning vs. Handoff vs. Execution Report profile?**
    - Use **Planning** when starting a new phase, implementing a major feature, or responding to a review with multiple issues.
    - Use **Handoff** when task execution is interrupted, switching Agents/models, or preserving state across sessions.
    - Use **Execution Report** when a milestone is complete, audit trail is needed, or results need certification.
    
    **Q2: Can a single AES document change profiles during its lifecycle?**
    Yes. Update the `aes_profile` field and add/remove profile-specific sections. Example evolution:
    1. Start as Planning Profile (`aes_profile: "planning"`)
    2. If interrupted, update to Handoff Profile (`aes_profile: "handoff"`) and add `state_snapshot`, `handoff_contract`
    3. When complete, update to Execution Report Profile (`aes_profile: "execution_report"`) and add `checkpoint_receipts`, `artifact_registry`
    
    **Q3: What's the minimum required for each profile?**
    - **Planning**: All Layer 1-3 core sections (meta, status, intent, artifacts, next_agent_context, implementation instructions, plan)
    - **Handoff**: All Planning sections PLUS `state_snapshot`, `handoff_contract`, `recovery_policy`
    - **Execution Report**: All Planning sections PLUS `checkpoint_receipts`, `artifact_registry`, `validation_rules`
    
    ### Handoff & Recovery
    
    **Q4: What should be included in `state_snapshot` for effective handoff?**
    - `last_known_good_state`: Human-readable description of current state
    - `resume_from`: Exact task ID or checkpoint to continue from
    - `remaining_work`: List of pending tasks
    - `completed_work`: List of completed tasks
    - `artifacts_ready_for_handoff`: Verified artifacts with integrity hashes
    
    **Q5: How do I ensure a smooth handoff between different AI models?**
    - Use `handoff_contract.boot_order` to specify exact startup sequence
    - List all `forbidden_assumptions` (e.g., "Don't assume previous model's capabilities")
    - Include `must_verify_before_execute` checklist (tests, artifact integrity)
    - Provide clear `handoff_instructions` with context about interruption
    
    **Q6: What recovery policies should I set for critical tasks?**
    - `rollback_on_failure: true` for tasks that can't leave system in broken state
    - `rollback_target`: Git tag or checkpoint to revert to
    - `fallback_agents`: Alternative agents if primary fails
    - `max_retries` and `retry_delay_seconds` for automatic recovery
    
    ### Execution Report & Validation
    
    **Q7: What evidence should be captured in `checkpoint_receipts`?**
    - Timestamp and agent who verified the checkpoint
    - Artifact snapshot with integrity hashes
    - Test results (baseline vs. current counts)
    - Any quality metrics collected at that point
    
    **Q8: How detailed should `artifact_registry` be?**
    Include all significant artifacts: source files, tests, documentation, configuration.
    Each entry should have: path, description, creation/modification times, integrity hash, verification status, and dependencies.
    
    **Q9: What validation rules ensure AES document consistency?**
    - `validation_rules.profile_specific_sections`: Map profiles to required sections
    - `validation_rules.allowed_profiles`: Valid values for `aes_profile`
    - `validation_rules.mandatory_for_all`: Sections required regardless of profile
    
    ### General Questions
    
    **Q10: How does AES relate to AGENTS.md and project conventions?**
    - **AES**: Document structure, task specification, continuity features
    - **AGENTS.md**: Project-specific commands, test suites, code style, environment
    - Always reference AGENTS.md for execution details (Python path, test commands)
    
    **Q11: Can I use AES for very small tasks (under 30 minutes)?**
    Not recommended. AES is designed for tasks requiring traceability, handoff, or audit trails.
    For small fixes, use regular conversation or simple checklists.
    
    **Q12: How should I version AES documents?**
    - `version`: Document version (e.g., "2.0.0")
    - `schema_version`: AES schema version (must match `validation_rules`)
    - Update `meta.updated_at` on every significant change
    - Use `parent_task_id` to link related documents across phases
    
