#### 3.4.3 Profile 演进流程

```
planning.aes.yaml
    │
    │ Agent 开始执行
    ▼
handoff.aes.yaml（可选，如需交接）
    │
    │ Agent 完成任务
    ▼
execution_report.aes.yaml（必需）
    │
    │ 更新 meta.aes_profile = "execution_report"
    │ 填写 execution_summary, execution_metrics, output_artifacts
    │ 填写 quality_verification 验证结果
    ▼
归档
```

**演进规则**：
1. 任务完成后，必须将 AES 文件演进到 execution_report Profile
2. 更新 `meta.aes_profile` 为 `"execution_report"`
3. 填写 `execution_summary`（必需字段：executing_agent, execution_start, execution_end）
4. 填写 `output_artifacts`（每个工件必需：path, description, status）
5. 填写 `quality_verification`（每个标准必需：criteria, status）
  
